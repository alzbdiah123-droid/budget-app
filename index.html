<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Budget App</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body>

<h2>إضافة عملية</h2>

<input id="title" placeholder="العنوان"><br><br>
<input id="amount" type="number" placeholder="المبلغ"><br><br>
<input id="type" placeholder="نوع (دخل / صرف)"><br><br>

<button onclick="addTransaction()">إضافة</button>

<script>
const supabase = window.supabase.createClient(
  "https://YOUR_PROJECT_URL.supabase.co",
  "YOUR_ANON_KEY"
);

async function addTransaction() {
  const title = document.getElementById("title").value;
  const amount = document.getElementById("amount").value;
  const type = document.getElementById("type").value;

  const { data, error } = await supabase
    .from("transactions")
    .insert([{ title, amount, type }]);

  if (error) {
    alert("خطأ: " + error.message);
  } else {
    alert("تمت الإضافة ✅");
  }
}
</script>

</body>
</html>
