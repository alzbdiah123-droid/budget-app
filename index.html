<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Budget App</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f4f6fb;
}

.container {
  padding: 15px;
}

/* العنوان */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.header h2 {
  margin: 0;
}

/* الكروت */
.cards {
  display: flex;
  gap: 10px;
  margin-top: 15px;
}

.card {
  flex: 1;
  padding: 15px;
  border-radius: 12px;
  color: white;
}

.income { background: #3b82f6; }
.expense { background: #ef4444; }

/* الدائرة */
.circle {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  background: conic-gradient(#ef4444 70%, #e5e7eb 0%);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 20px auto;
  font-size: 18px;
}

/* الإدخال */
input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

/* زر */
button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  background: #3b82f6;
  color: white;
  border-radius: 10px;
  font-size: 16px;
}

/* القائمة */
.list {
  margin-top: 20px;
}

.item {
  background: white;
  padding: 10px;
  border-radius: 10px;
  margin-top: 8px;
  display: flex;
  justify-content: space-between;
}
</style>

</head>

<body>

<div class="container">

  <div class="header">
    <h2>💰 Budget</h2>
    <button onclick="toggleMode()">🌙</button>
  </div>

  <div class="cards">
    <div class="card income">
      دخل <br>
      <span id="income">0</span>
    </div>
    <div class="card expense">
      صرف <br>
      <span id="expense">0</span>
    </div>
  </div>

  <div class="circle" id="circle">
    0%
  </div>

  <h3>إضافة عملية</h3>

  <input id="title" placeholder="العنوان">
  <input id="amount" type="number" placeholder="المبلغ">
  <input id="type" placeholder="دخل / صرف">

  <button onclick="add()">إضافة</button>

  <div class="list" id="list"></div>

</div>

<script>
let data = [];

function add() {
  let title = document.getElementById("title").value;
  let amount = parseInt(document.getElementById("amount").value);
  let type = document.getElementById("type").value;

  data.push({title, amount, type});
  render();
}

function render() {
  let list = document.getElementById("list");
  list.innerHTML = "";

  let income = 0;
  let expense = 0;

  data.forEach(d => {
    let div = document.createElement("div");
    div.className = "item";
    div.innerHTML = d.title + " <span>" + d.amount + "</span>";
    list.appendChild(div);

    if (d.type.includes("دخل")) income += d.amount;
    else expense += d.amount;
  });

  document.getElementById("income").innerText = income;
  document.getElementById("expense").innerText = expense;

  let percent = income ? Math.round((expense / income) * 100) : 0;

  document.getElementById("circle").innerText = percent + "%";
  document.getElementById("circle").style.background =
    `conic-gradient(#ef4444 ${percent}%, #e5e7eb 0%)`;
}

function toggleMode() {
  document.body.style.background =
    document.body.style.background === "black" ? "#f4f6fb" : "black";
}
</script>

</body>
</html>
